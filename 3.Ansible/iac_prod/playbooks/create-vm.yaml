# this playbook create gcp vm 
- name: Create a single Instance
  hosts: localhost 
  vars: 
     machine_name: "first-gcp-vm"
     google_project_id: "project-c45d55f1-5e60-4275-9a4"
     #service_account_path: "service_account_path"
     ssh_public_key_path: "/home/kk/.ssh/id_ed25519.pub"
    #  wif_json_path: "ansible-wif.json"
     adc_file: "/home/kk/.config/gcloud/application_default_credentials.json"
  tasks:
  - name: Slurp the local public key
    slurp: 
      src: "{{ ssh_public_key_path }}" 
    register: ssh_pub_key
  - name: install Pip
    apt: 
      name: python3-pip
      state: present 
    when: false 
  - name: Ensure the package are installed
    pip:
      name:
        - requests
        - google-auth
    when: false  
      #state: present
  - name: Install Python packages via apt
    apt:
      name:
        - python3-requests
        - python3-google-auth
      state: present
      update_cache: yes
  - name: Create GCP instance
    google.cloud.gcp_compute_instance:
      name: "{{machine_name}}"
      machine_type: "e2-medium"
      zone: "us-central1-a"
      project: "{{google_project_id}}"
      auth_kind: application
      #auth_kind: "serviceaccount"
      #service_account_file: "{{ service_account_path }}"
      state: present
      metadata:
        ssh-keys: "kk:{{ ssh_pub_key['content'] | b64decode }}"
        startup-script: |
          #!/bin/bash 
          sudo apt-get update && sudo apt-get upgrade -y 
          sudo apt-get install fish -y
      disks:
        - auto_delete: true
          boot: true
          initialize_params:
            source_image: "projects/ubuntu-os-cloud/global/images/family/ubuntu-2204-lts"
            disk_size_gb: 15
            disk_type: "pd-standard"
      network_interfaces:
        - network:
            selfLink: "projects/{{google_project_id}}/global/networks/default"
          access_configs:
            - name: External NAT
              type: ONE_TO_ONE_NAT
      tags:
        items:
          - http-server
          - https-server
    register: gcp_instance
    when: true 
    environment: 
      GOOGLE_APPLICATION_CREDENTIALS: "{{ adc_file }}"
      GOOGLE_EXTERNAL_ACCOUNT_ALLOW_EXECUTABLES: "1"
  - name: Write gcp_instance into json file
    copy:
      content: "{{ gcp_instance }}"
      dest: "./gcp_instance.json"
    when: true 
  # - name: Generate Inventory
  #   template: 
  #     src: ../templates/gcp-inventory-template.j2
  #     dest: ../inventory/hosts.ini