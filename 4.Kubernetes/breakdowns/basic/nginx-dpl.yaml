apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-dpl
spec:
  # strategies 
  replicas: 4
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
      - name: nginx-cont
        image: nginx
        ports:
        - containerPort: 80
