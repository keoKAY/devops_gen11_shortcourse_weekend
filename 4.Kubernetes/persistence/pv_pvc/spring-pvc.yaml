apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-storage-pv
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Recycle
  storageClassName: nfs-sharing
  # mountOptions:
  #   - hard
  #   - nfsvers=4.1
  nfs:
    path: /srv/nfs_shared
    server: 10.148.0.4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-storage-pvc
spec:
  resources:
    requests:
      storage: 15Gi
  volumeMode: Filesystem
  storageClassName: nfs-sharing
  accessModes:
    - ReadWriteMany
